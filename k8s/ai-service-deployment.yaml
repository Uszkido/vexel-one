apiVersion: apps/v1
kind: Deployment
metadata:
  name: vexel-ai-service
  labels:
    app: vexel-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vexel-ai
  template:
    metadata:
      labels:
        app: vexel-ai
    spec:
      containers:
      - name: vexel-ai-service
        image: vexelinnovations/ai-service:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: vexel-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: vexel-ai-service
spec:
  selector:
    app: vexel-ai
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
