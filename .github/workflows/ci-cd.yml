name: Vexel One CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-backend:
    name: Backend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Build TypeScript
        run: cd backend && npm run build
      - name: Run Prisma Generate
        run: cd backend && npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  lint-and-test-ai:
    name: AI Service Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: cd ai-services && pip install -r requirements.txt
      - name: Syntax check
        run: cd ai-services && python -m py_compile app/main.py

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    name: Build and Push Backend Docker Image
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: vexelinnovations/backend:latest,vexelinnovations/backend:${{ github.sha }}
      - name: Build and Push AI Service
        uses: docker/build-push-action@v6
        with:
          context: ./ai-services
          push: true
          tags: vexelinnovations/ai-service:latest,vexelinnovations/ai-service:${{ github.sha }}
